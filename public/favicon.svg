<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="slab-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Rounded App Icon Style) -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="4" />

  <!-- Subtle grid lines in background to emphasize measurement/scale -->
  <g opacity="0.15" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="80" y1="256" x2="432" y2="256" />
    <line x1="256" y1="80" x2="256" y2="432" />
    <circle cx="256" cy="256" r="120" fill="none" />
    <circle cx="256" cy="256" r="180" fill="none" />
  </g>

  <!-- Stylized "Litho" Stone Slab / Block (3D isometric perspective representation) -->
  <g transform="translate(256, 240)">
    <!-- Bottom Shadow -->
    <path d="M -130,20 L 0,-45 L 130,20 L 0,85 Z" fill="#000000" opacity="0.4" filter="blur(6px)" />
    
    <!-- Left Side of Block -->
    <path d="M -120,10 L 0,70 L 0,130 L -120,70 Z" fill="#0369a1" />
    
    <!-- Right Side of Block -->
    <path d="M 0,70 L 120,10 L 120,70 L 0,130 Z" fill="#0284c7" />
    
    <!-- Top Face of Block (The stone slab surface) -->
    <path d="M -120,10 L 0,-50 L 120,10 L 0,70 Z" fill="url(#slab-grad)" />
    
    <!-- Measurement markings/ticks on the top slab edge (Scale aspect) -->
    <!-- Left edge ticks -->
    <path d="M -100,0 L -95,2 M -80,-10 L -75,-8 M -60,-20 L -55,-18 M -40,-30 L -35,-28 M -20,-40 L -15,-38" stroke="#ffffff" stroke-width="2" opacity="0.7" />
    <!-- Right edge ticks -->
    <path d="M 100,0 L 95,2 M 80,-10 L 75,-8 M 60,-20 L 55,-18 M 40,-30 L 35,-28 M 20,-40 L 15,-38" stroke="#ffffff" stroke-width="2" opacity="0.7" />

    <!-- Sleek precise laser caliper / ruler lines crossing the slab -->
    <path d="M -150,30 L 150,-70" stroke="#38bdf8" stroke-width="3" filter="url(#glow)" opacity="0.8" />
    <!-- Dimension helper lines -->
    <path d="M -120,40 L -120,-20 M 120,40 L 120,-20" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 3" opacity="0.5" />
    
    <!-- Ruler arrows and "L" geometric line -->
    <path d="M -120,-10 L 120,-10" stroke="url(#accent-grad)" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
    <path d="M -60,110 L -60,170 L 60,170" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" filter="url(#glow)" />
  </g>

  <!-- High contrast crosshairs / measurement ticks in corners -->
  <path d="M 60,80 L 80,80 L 80,60" fill="none" stroke="#0ea5e9" stroke-width="3" />
  <path d="M 452,80 L 432,80 L 432,60" fill="none" stroke="#0ea5e9" stroke-width="3" />
  <path d="M 60,432 L 80,432 L 80,452" fill="none" stroke="#0ea5e9" stroke-width="3" />
  <path d="M 452,432 L 432,432 L 432,452" fill="none" stroke="#0ea5e9" stroke-width="3" />

  <!-- Center elegant laser blue dot -->
  <circle cx="256" cy="240" r="5" fill="#ffffff" filter="url(#glow)" />
</svg>
